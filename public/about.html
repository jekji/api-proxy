<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        /* 基础样式复位 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        /* 容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 20px;
        }

        /* 头部区域 */
        .header-section {
            text-align: center;
            padding: 60px 0;
            background: #ffffff;
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
        }

        .header-section h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .image-box {
            background: #ddd;
            height: 300px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-box h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .text-box p {
            margin-bottom: 15px;
        }

        /* 价值观/数据展示 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
            text-align: center;
        }

        .stat-item h3 {
            font-size: 2rem;
            color: #3498db;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .header-section h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="container">
            <h1>关于我们</h1>
            <p>连接创新与未来，为客户创造真实价值。</p>
        </div>
    </header>

    <main class="container">
        <section class="content-grid">
            <div class="image-box">
                <div style="padding: 20px; text-align: center;">[ 团队照片 / 办公环境 ]</div>
            </div>
            
            <div class="text-box">
                <h2>我们的愿景</h2>
                <p>我们致力于通过最前沿的技术和深刻的市场洞察，为全球用户提供卓越的数字体验。无论是初创企业还是成熟品牌，我们都与其并肩作战，突破局限。</p>
                <p>自 2024 年成立以来，我们始终坚持“简单、透明、高效”的核心理念，不断探索行业边界。</p>
            </div>
        </section>

        <section class="stats-row">
            <div class="stat-item">
                <h3>50+</h3>
                <p>成功案例</p>
            </div>
            <div class="stat-item">
                <h3>12</h3>
                <p>核心成员</p>
            </div>
            <div class="stat-item">
                <h3>24/7</h3>
                <p>客户支持</p>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px; color: #999; font-size: 0.9rem;">
        &copy; 2026 您的公司名称. 保留所有权利.
    </footer>

</body>
</html>
